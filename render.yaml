services:
  # ─── Backend (FastAPI) ────────────────────────────────────────────────────
  - type: web
    name: research-engine-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    plan: standard          # free tier is too slow for LLM pipelines
    healthCheckPath: /api/research
    envVars:
      - key: HF_TOKEN
        sync: false         # set manually in Render dashboard
      - key: EXA_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: HF_MODEL
        value: meta-llama/Meta-Llama-3.1-70B-Instruct
      - key: LLM_TEMPERATURE
        value: "0.3"
      - key: OUTPUT_FILE
        value: research_report.md
      # Set this AFTER the frontend deploys — paste its Render URL here
      - key: ALLOWED_ORIGINS
        sync: false

  # ─── Frontend (Vite / React) ──────────────────────────────────────────────
  - type: web
    name: research-engine-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    routes:
      # Rewrite all routes to index.html for client-side routing
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set this to your backend Render URL, e.g.:
      # https://research-engine-api.onrender.com/api
      - key: VITE_API_URL
        sync: false